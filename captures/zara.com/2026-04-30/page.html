 /^((?!chrome|android).)*safari/i.test(navigator.userAgent);\n    \n      function check() {\n        if (NEW_IN.test(document.documentElement.id)) {\n          const videoElements = document.querySelectorAll('video:not(.autoplayed');\n          videoElements.forEach((video, idx) => {\n            if (idx > 0 && !isElementInViewport(video)) return;\n            const toggleButton = video.parentElement.querySelector('.media-video-audio-toggle')\n            if (!toggleButton) return;\n            if (video.muted) toggleButton.click();\n            video.classList.add('autoplayed');\n          });\n        }\n      }\n    \n      _zaraRequire(['plugins/router/engine'], (Router) => {\n        if (!isSafari) {\n            Router.registerMiddleware('beforeShow', () => {\n                // Add scroll event listener to check for videos in the viewport\n                window.addEventListener('scroll', check);\n                setTimeout(check, 500);\n                setTimeout(check, 1000);\n                setTimeout(check, 2000);\n                setTimeout(check, 3000);\n            });\n        }\n      })\n    })();\n\u003c/script>\n"},"key":"ESpot_WebCommonScripts"},"ESpot_Footer_Links":{"type":"html","content":{"content":"\u003cstyle>\r\n  .theme--origins .footer-links__wrapper .footer-links__title {\r\n    font-size: var(--font-size-label-m-highlight);\r\n    line-height: var(--line-height-label-m-highlight);\r\n    letter-spacing: var(--letter-spacing-label-m-highlight);\r\n    text-transform: var(--text-transform-label-m-highlight);\r\n    font-stretch: var(--font-stretch-label-m-highlight);\r\n    font-weight: var(--font-weight-label-m-highlight);\r\n  }\r\n\r\n  .theme--origins .footer-links__wrapper .footer-links__list li,\r\n  .theme--origins\r\n    .footer-links__wrapper\r\n    .footer-links__list\r\n    #ot-sdk-btn.ot-sdk-show-settings {\r\n    text-transform: capitalize;\r\n  }\r\n\r\n  .footer-links__wrapper {\r\n    display: flex;\r\n    margin-bottom: lményt és a szolgáltatásainkat kívánjuk javítani, másrészt pedig a weboldalunk használatát kívánjuk elemezni. A böngészés folytatásával elfogadja a használatukat. \u003ca href=\"{href}\" target=\"blank\">További információ\u003c/a>","ca_ES":"Utilitzem cookies pròpies i de tercers per millorar la teva experiència i els nostres serveis analitzant la navegació en el nostre web. Si continueu navegant, considerem que n’accepta l'ús. + info","ar_SA":"نستخدم ملفات تعريف ارتباط خاصة ولأطراف أخري لتحسين تجربتك وتقديم أفضل جودة من خدماتنا حيث نقوم بتحليل التصفح في موقعنا. في استمررت في التصفح، فسوف يعد ذلك موافقة ضمنية على سياسية الخصوصية\u003ca href=\"{href}\" target=\"blank\">+Info.\u003c/a>","gl_ES":"Utilizamos cookies propias e de terceiros para mellorar a túa experiencia e os nosos servizos analizando a navegación na nosa web. Se continuas navegando, consideramos que aceptas o seu uso +Info","es_MX":"Utilizamos cookies propias y de terceros para mejorar tu experiencia y nuestros servicios analizando la navegación en nuestra web. Si continuas navegando, consideramos que aceptas su uso \u003ca href=\"{href}\" target=\"blank\">+Info\u003c/a>","sk_SK":"Používamevlastné súbory cookies spoločne s cookies tretích strán, aby sme Váš zážitok a naše služby robili lepšími, a to vďaka analýze Vášho pohybu po našej webovej stránke. Ak budete pokračovať v prezeraní stránky, znamená to, že súhlasíte s podmienkami jej použitia\u003ca href=\"{href}\" target=\"blank\">+Info\u003c/a>","es_ES":"Utilizamos cookies propias y de terceros para mejorar tu experiencia y nuestros servicios analizando la navegación en nuestra web. Si continuas navegando, consideramos que aceptas su uso \u003ca href=\"{href}\" target=\"blank\">+Info\u003c/a>","nl_NL":"We gebruiken onze eigen cookies en die van derden om je ervaring en onze diensten te verbeteren, doordat we de manier waarop je op onze website browset kunnen analyseren. Als je doorgaat met browsen, nemen we aan dat je het gebruik ervan accepteert Meer \u003ca href=\"{href}\" target=\"blank\">informatie.\u003c/a>","sq_AL":"Ne përdorim cookie tonat dhe të palëve të treta në mënyrë që të përmirësojmë eksperiencën tënde dhe shërbimet që ofrojmë duke analizuar përdorimin nga klientët e faqes tonë në internet. Nëse vazhdon të përdorësh faqen tonë në internet, ne supozojmë se ke pranuar rregullat e përdorimit \u003ca href=\"{href}\" target=\"blank\">+ informacionin\u003c/a>","sv_SE":"Vi använder egna cookies och tredjepartscookies för att förbättra din upplevelse och våra tjänster genom att analysera navigeringen på vår webbplats. Om du fortsätter att surfa betraktar vi det som att du godkänner att de används \u003ca href=\"{href}\" target=\"blank\">+Info\u003c/a>","da_DK":"Vi bruger vores egne og tredjeparters cookies for at forbedre din online oplevelse og vores serviceydelser gennem en analyse af navigationen på vores hjemmeside. Fortsat navigation på siden vil blive opfattet som accept af brugen heraf \u003ca href=\"{href}\" target=\"blank\">+Info\u003c/a>","sr_RS":"Koristimo svoje kolačiće i kolačiće trećih strana kako bismo poboljšali vaš doživljaj i naše usluge analizom navigacije na našem veb-sajtu. Smatramo da prihvatate njihovu upotrebu ako nastavite da pregledate veb-sajt. \u003ca href=\"{href}\" target=\"blank\">Više informacija\u003c/a>","hr_HR":"Upotrebljavamo vlastite kolačiće i kolačiće trećih strana kako bismo poboljšali vaš doživljaj i naše usluge analizirajući navigaciju na našoj mrežnoj stranici. Nastavkom pregledavanja stranice smatramo da prihvaćate njihovu uporabu. \u003ca href=\"{href}\" target=\"blank\">Više informacija\u003c/a>","ko_KR":"저희 웹사이트 방문을 분석하여, 사용자의 편의과 저희의 서비스를 개선하기 위해 저희 그리고 제3자의 쿠키를 사용합니다. 저희 사이트를 계속 사용하는 경우, 쿠키 사용을 수락하는 것으로 간주됩니다. 더 자세한 정보는 저희의 \u003ca href={href} target='blank'>쿠키 정책\u003c/a>을 참조하십시오.","en_US":"We use first- and third-party cookies to improve your browsing experience and our services\u003cbr/> by analyzing the use of the website.\u003cbr/> By continuing to use this site \u003cbr>you agree to their use. Click here for more information on our \u003ca href={href} target='blank'>Cookies Policy\u003c/a>.","lt_LT":"Norėdami pagerinti jūsų patirtį ir mūsų aptarnavimą, naudojame savo ir trečiųjų šalių slapukus. Pasitelkdami juos, analizuojame naršymą mūsų tinklapyje.  Tęsdami naršymą sutinkate su jų naudojimu \u003ca href=\"{href}\" target=\"blank\">Daugiau informacijos\u003c/a>","kk_KZ":"Веб-сайтымыздағы шолуыңызды талдау арқылы тәжірибеңіз бен қызметтерімізді жақсарту үшін бірінші және үшінші тараптық cookie файлдарын пайдаланамыз. Шолуды жалғастырсаңыз, \u003ca href=\"{href}\" target=\"blank\">+ақпаратты\u003c/a> пайдалануға келісім бердіңіз деп есептейміз","no_NO":"Vi bruker egne og tredjeparts informasjonskapsler for å forbedre opplevelsen og tjenestene våre, ved å analysere navigeringen på nettstedet vårt. Hvis du fortsetter å navigere her, anser vi at du aksepterer dette. Mer \u003ca href=\"{href}\" target=\"blank\">informasjon.\u003c/a>","it_IT":"Utilizziamo i nostri cookie e quelli di terzi per migliorare la tua esperienza e i nostri servizi, dato che ci consentono di analizzare la navigazione sul nostro sito web. Se si prosegue nella navigazione, se ne riterrà accettato l'uso \u003ca href=\"{href}\" target=\"blank\">+Info\u003c/a>","ru_RU":"Мы используем файлы cookie, разработанные нашими специалистами и третьими лицами,  для анализа событий на нашем веб-сайте, что позволяет нам улучшать взаимодействие с пользователями и обслуживание. Продолжая просмотр страниц нашего сайта, вы принимаете условия его использования. Более подробные сведения см. в  нашей \u003ca href={href} target='blank'>Политике в отношении файлов Cookie\u003c/a>.","el_GR":"Χρησιμοποιούμε δικά μας cookies και cookies τρίτων για να βελτιώσουμε την εμπειρία σας και τις υπηρεσίες μας, αναλύοντας την περιήγησή σας στον ιστότοπό μας. Αν συνεχίσετε την περιήγηση, θεωρούμε ότι αποδέχεστε τη χρήση τους \u003ca href=\"{href}\" target=\"blank\">+Info\u003c/a>","pl_PL":"Wykorzystujemy pliki cookies własne i stron trzecich w celu doskonalenia jakości obsługi oraz ulepszenia usług na podstawie analizy nawigacji na naszej stronie internetowej. Dalsze korzystanie z tej strony internetowej, oznacza akceptację plików cookies.","zt_TW":"\u003cbr/>我們透過分析對我們網站的瀏覽情況，使用自己和協力廠商 Cookie 來改善您的體驗和我們的服務水平。 \u003cbr/> \u003cbr>透過繼續瀏覽，我們認為您接受其使用。 按此處瞭解有關我們 \u003ca href={href} target='blank'>Cookie 政策\u003c/a>的更多資訊。","ar_LB":"نستخدم ملفات تعريف ارتباط خاصة ولأطراف أخري لتحسين تجربتك وتقديم أفضل جودة من خدماتنا حيث نقوم بتحليل التصفح في موقعنا. في استمررت في التصفح، فسوف يعد ذلك موافقة ضمنية على سياسية الخصوصية\u003ca href=\"{href}\" target=\"blank\">+Info.\u003c/a>","tr_TR":"İnsanların web sitemizi nasıl kullandıklarını analiz ederek, \u003cbr/> deneyiminizi ve hizmetlerimizi daha iyi hale getirmek için kendi çerezlerimizi ve üçüncü taraf çerezleri kullanıyoruz.\u003cbr/> Web sitesini kullanmaya devam ettiğinizde \u003cbr>bunların kullanımını kabul ettiğinizi anlıyoruz. \u003ca href={href} target='blank'>Çerez Politikamız\u003c/a> hakkında daha fazla bilgi için burayı tıklayın.","id_ID":"Kami menggunakan cookie kami sendiri dan cookie pihak ketiga untuk meningkatkan pengalaman penggunaan Anda serta kualitas layanan kami\u003cbr/> dengan menganalisis navigasi situs web kami.\u003cbr/> Apabila Anda melanjutkan menggunakan situs web, kami memahami \u003cbr>bahwa Anda menyetujui penggunaan cookie ini. Klik di sini untuk informasi lebih lanjut terkait \u003ca href={href} target='blank'>Kebijakan Cookie\u003c/a>kami.","he_IL":"אנו משתמשים בקובצי Cookie משלנו ובקובצי Cookie של צדדי ג' כדי לשפר את החוויה שלכם ואת השירותים שלנו וכדי לנתח את השימוש באתר שלנו. אם תמשיכו לגלוש, אנו נסיק שאתם מסכימים לשימוש בהם \u003ca href=\"{href}\" target=\"blank\">+מידע\u003c/a>","fr_FR":"Nous utilisons nos propres cookies ainsi que des cookies de tiers pour améliorer votre expérience et nos services en analysant la navigation sur notre site Web. Si vous continuez à naviguer, nous considérons alors que vous acceptez leur utilisation et les \u003ca href=\"{href}\" target=\"blank\">informations.\u003c/a>","ja_JP":"お客さまの利便性向上と当サイトのサービス向上のため、独自および第三者のクッキー(Cookie)を使用し、サイトの閲覧状況を分析しています。閲覧を続ける場合、お客さまがその使用を承諾したとみなされます。 なお、詳細につきましては\u003ca href={href} target='blank'>クッキーポリシー\u003c/a>にてご覧いただけます。 ","de_DE":"Wir nutzen eigene Cookies sowie Cookies von Dritten, um Ihre Erfahrung und unseren Service zu verbessern, indem wir das Surfverhalten auf unserer Website analysieren. Wenn Sie unsere Website weiterhin benutzen, gehen wir davon aus, dass Sie der Verwendung von Cookies zustimmen \u003ca href=\"{href}\" target=\"blank\">+Info\u003c/a>","ms_MY":"Kami menggunakan kuki kami sendiri dan kuki pihak ketiga bagi menambah baik pengalaman penggunaan anda dan mutu perkhidmatan kami\u003cbr/> dengan menganalisis pelayaran di laman web kami.\u003cbr/> Apabila anda terus menggunakan laman web, kami faham \u003cbr>yang anda bersetuju dengan penggunaan kuki ini. Klik di sini untuk maklumat lanjut berkenaan \u003ca href={href} target='blank'>Dasar Kuki\u003c/a>kami.","uz_UZ":"Veb-saytimizda sahifalar tomoshasini tahlil qilish orqali taassurotlaringiz va xizmatlarimizni yaxshilash uchun birinchi tomon va uchinchi tomon cookie-fayllaridan foydalanamiz. Agar kezishda davom etsangiz, siz \u003ca href=\"{href}\" target=\"blank\">+ Maʼlumot\u003c/a>dan foydalanishni qabul qilasiz deb hisoblaymiz","eu_ES":"Gure cookieak eta hirugarrenenak erabiltzen ditugu webguneko nabigazioa aztertuz zure esperientzia, batetik, eta gure zerbitzuak, bestetik, hobetzeko. Nabigatzen jarraitzen baduzu, horiek erabiltzea onartzen duzula ulertuko dugu. \u003ca href=\"{href}\" target=\"blank\">Informazio gehiago\u003c/a>","bg_BG":"Използваме както собствени, така и бисквитки на трети страни, за да подобрим Вашия впечатления от сайта и нашите услуги, като анализираме сърфирането на нашия уебсайт. Ако продължите да сърфирате, ще смятаме, че приемате тяхното използване \u003ca href=\"{hr <script>
   (function() {
      // Function to check if an element is in the viewport
      function isElementInViewport(el) {
        const rect = el.getBoundingClientRect();
        return (
          rect.top >= 0 &&
          rect.left >= 0 &&
          rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
          rect.right <= (window.innerWidth || document.documentElement.clientWidth)
        );
      }
    
      const NEW_IN = /(I2024-MUJER-ULTIMA-SEMANA|I2024-MUJER-BANNERS-JJ|I2024-HOMBRE-GUITARRICADELAFUENTE)/;
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    
      function check() {
        if (NEW_IN.test(document.documentElement.id)) {
          const videoElements = document.querySelectorAll('video:not(.autoplayed');
          videoElements.forEach((video, idx) => {
            if (idx > 0 && !isElementInViewport(video)) return;
            const toggleButton = video.parentElement.querySelector('.media-video-audio-toggle')
            if (!toggleButton) return;
            if (video.muted) toggleButton.click();
            video.classList.add('autoplayed');
          });
        }
      }
    
      _zaraRequire(['plugins/router/engine'], (Router) => {
        if (!isSafari) {
            Router.registerMiddleware('beforeShow', () => {
                // Add scroll event listener to check for videos in the viewport
                window.addEventListener('scroll', check);
                setTimeout(check, 500);
                setTimeout(check, 1000);
                setTimeout(check, 2000);
                setTimeout(check, 3000);
            });
        }
      })
    })();
</script>
