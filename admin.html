<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiver — Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 24px; max-width: 700px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
  .setup { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .setup label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
  .setup input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.9rem; margin-bottom: 14px; }
  .setup button { padding: 10px 20px; border-radius: 8px; border: none; background: #2563eb; color: #fff; cursor: pointer; font-size: 0.9rem; }
  .setup button:hover { background: #1d4ed8; }
  .section { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .section h2 { font-size: 1.1rem; margin-bottom: 16px; }
  .site-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
  .site-row:last-child { border-bottom: none; }
  .site-name { font-weight: 600; min-width: 120px; }
  .site-url { color: #888; font-size: 0.85rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-edit { background: none; border: 1px solid #444; color: #60a5fa; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .btn-edit:hover { background: #151525; }
  .btn-remove { background: none; border: 1px solid #444; color: #f87171; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .btn-remove:hover { background: #2a1515; }
  .edit-row { display: flex; gap: 8px; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
  .edit-row input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.85rem; }
  .btn-ok { background: none; border: 1px solid #444; color: #22c55e; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .btn-ok:hover { background: #152515; }
  .btn-cancel { background: none; border: 1px solid #444; color: #aaa; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .add-form { display: flex; gap: 10px; margin-top: 16px; }
  .add-form input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.9rem; }
  .btn-add { padding: 10px 20px; border-radius: 8px; border: none; background: #22c55e; color: #fff; cursor: pointer; font-size: 0.9rem; }
  .btn-add:hover { background: #16a34a; }
  .btn-save { padding: 12px 28px; border-radius: 8px; border: none; background: #2563eb; color: #fff; cursor: pointer; font-size: 1rem; margin-right: 10px; }
  .btn-save:hover { background: #1d4ed8; }
  .btn-scrape { padding: 12px 28px; border-radius: 8px; border: none; background: #f59e0b; color: #000; cursor: pointer; font-size: 1rem; font-weight: 600; }
  .btn-scrape:hover { background: #d97706; }
  .btn-scrape:disabled { background: #555; color: #999; cursor: not-allowed; }
  .actions { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
  .scrape-status { margin-top: 16px; padding: 14px 18px; border-radius: 10px; border: 1px solid #222; background: #141414; display: none; }
  .scrape-status .status-icon { font-size: 1.1rem; margin-right: 8px; }
  .scrape-status.running { border-color: #f59e0b; }
  .scrape-status.success { border-color: #22c55e; }
  .scrape-status.failed { border-color: #ef4444; }
  .capture-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
  .capture-row:last-child { border-bottom: none; }
  .capture-domain { font-size: 0.9rem; }
  .capture-actions { display: flex; gap: 8px; }
  .btn-delete { background: none; border: 1px solid #444; color: #f87171; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .btn-delete:hover { background: #2a1515; }
  .btn-delete:disabled { color: #555; border-color: #333; cursor: not-allowed; }
  .btn-delete-all { padding: 8px 18px; border-radius: 8px; border: none; background: #ef4444; color: #fff; cursor: pointer; font-size: 0.85rem; margin-top: 12px; }
  .btn-delete-all:hover { background: #dc2626; }
  .btn-delete-all:disabled { background: #555; cursor: not-allowed; }
  .btn-refresh { background: none; border: 1px solid #444; color: #60a5fa; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-left: 10px; }
  .date-picker { padding: 8px 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.85rem; margin-left: 10px; }
  .empty-msg { color: #555; font-size: 0.85rem; padding: 10px 0; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #22c55e; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 0.9rem; display: none; z-index: 100; }
  .toast.error { background: #ef4444; }
  .hidden { display: none; }
  .help { font-size: 0.8rem; color: #666; margin-top: 4px; }
</style>
</head>
<body>

<h1>Adhiver — Admin</h1>
<p class="subtitle">Manage your sites and trigger scraping</p>

<div class="setup" id="setup">
  <label>GitHub Username</label>
  <input id="gh-user" placeholder="your-username"/>
  <label>Personal Access Token (<a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=adhiver-admin" target="_blank" style="color:#60a5fa">create one here</a>)</label>
  <input id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxx"/>
  <p class="help">Needs <strong>repo</strong> and <strong>workflow</strong> scopes. Stored in your browser only.</p>
  <br/>
  <button onclick="connect()">Connect</button>
</div>

<div id="main" class="hidden">
  <div class="section">
    <h2>Sites</h2>
    <div id="site-list"></div>
    <div class="add-form">
      <input id="new-name" placeholder="Brand name"/>
      <input id="new-url" placeholder="https://www.example.com"/>
      <button class="btn-add" onclick="addSite()">Add</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn-save" onclick="saveSites()">Save to GitHub</button>
    <button class="btn-scrape" id="btn-scrape" onclick="runScrape()">Run Scrape Now</button>
  </div>
  <div class="scrape-status" id="scrape-status"></div>

  <div class="section" style="margin-top:24px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <h2 style="margin-bottom:0">Captures</h2>
      <div>
        <input type="date" id="capture-date" class="date-picker" onchange="loadCaptures()"/>
        <button class="btn-refresh" onclick="loadCaptures()">Refresh</button>
      </div>
    </div>
    <div id="capture-list" style="margin-top:14px"></div>
    <button class="btn-delete-all" id="btn-delete-all" onclick="deleteAllCaptures()" style="display:none">Delete all captures for this date</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REPO = "adhiver-personal";
let sites = [];
let fileSha = "";
let editingIndex = -1;
let captureFiles = [];

function getHeaders() {
  return {
    "Authorization": "token " + localStorage.getItem("gh_token"),
    "Accept": "application/vnd.github.v3+json"
  };
}
function getUser() { return localStorage.getItem("gh_user"); }

function toast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isError ? " error" : "");
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

function setStatus(msg, state) {
  const el = document.getElementById("scrape-status");
  const icons = { running: "⏳", success: "✅", failed: "❌" };
  el.innerHTML = '<span class="status-icon">' + (icons[state]||"") + '</span>' + msg;
  el.className = "scrape-status " + state;
  el.style.display = "block";
}

function todayUTC() {
  return new Date().toISOString().slice(0, 10);
}

async function connect() {
  const user = document.getElementById("gh-user").value.trim();
  const token = document.getElementById("gh-token").value.trim();
  if (!user || !token) { toast("Fill both fields", true); return; }
  localStorage.setItem("gh_user", user);
  localStorage.setItem("gh_token", token);
  await loadSites();
}

async function loadSites() {
  try {
    const res = await fetch("https://api.github.com/repos/" + getUser() + "/" + REPO + "/contents/sites.yaml", { headers: getHeaders() });
    if (!res.ok) throw new Error("Cannot access repo");
    const data = await res.json();
    fileSha = data.sha;
    const content = atob(data.content.replace(/\n/g, ""));
    sites = parseYaml(content);
    document.getElementById("setup").classList.add("hidden");
    document.getElementById("main").classList.remove("hidden");
    document.getElementById("capture-date").value = todayUTC();
    renderSites();
    loadCaptures();
    toast("Connected");
  } catch(e) {
    toast("Connection failed: " + e.message, true);
  }
}

function parseYaml(text) {
  const result = [];
  const lines = text.split("\n");
  let current = {};
  for (const line of lines) {
    const urlMatch = line.match(/^\s*-\s*url:\s*(.+)/);
    const nameMatch = line.match(/^\s*name:\s*(.+)/);
    if (urlMatch) {
      if (current.url) result.push(current);
      current = { url: urlMatch[1].trim() };
    } else if (nameMatch) {
      current.name = nameMatch[1].trim();
    }
  }
  if (current.url) result.push(current);
  return result;
}

function toYaml(sites) {
  return sites.map(function(s) { return "- url: " + s.url + "\n  name: " + s.name; }).join("\n") + "\n";
}

function renderSites() {
  var list = document.getElementById("site-list");
  list.innerHTML = sites.map(function(s, i) {
    if (i === editingIndex) {
      return '<div class="edit-row">' +
        '<input id="edit-name" value="' + s.name + '"/>' +
        '<input id="edit-url" value="' + s.url + '"/>' +
        '<button class="btn-ok" onclick="saveEdit(' + i + ')">OK</button>' +
        '<button class="btn-cancel" onclick="cancelEdit()">Cancel</button>' +
        '</div>';
    }
    return '<div class="site-row">' +
      '<span class="site-name">' + s.name + '</span>' +
      '<span class="site-url">' + s.url + '</span>' +
      '<button class="btn-edit" onclick="startEdit(' + i + ')">Edit</button>' +
      '<button class="btn-remove" onclick="removeSite(' + i + ')">Remove</button>' +
      '</div>';
  }).join("");
}

function startEdit(i) { editingIndex = i; renderSites(); }
function saveEdit(i) {
  var name = document.getElementById("edit-name").value.trim();
  var url = document.getElementById("edit-url").value.trim();
  if (!name || !url) { toast("Fill both fields", true); return; }
  sites[i] = { name: name, url: url };
  editingIndex = -1;
  renderSites();
  toast("Edited — click Save to push to GitHub");
}
function cancelEdit() { editingIndex = -1; renderSites(); }

function addSite() {
  var name = document.getElementById("new-name").value.trim();
  var url = document.getElementById("new-url").value.trim();
  if (!name || !url) { toast("Fill name and URL", true); return; }
  sites.push({ url: url, name: name });
  document.getElementById("new-name").value = "";
  document.getElementById("new-url").value = "";
  renderSites();
  toast("Added — click Save to push to GitHub");
}

function removeSite(i) {
  sites.splice(i, 1);
  renderSites();
  toast("Removed — click Save to push to GitHub");
}

async function saveSites() {
  try {
    var content = btoa(unescape(encodeURIComponent(toYaml(sites))));
    var res = await fetch("https://api.github.com/repos/" + getUser() + "/" + REPO + "/contents/sites.yaml", {
      method: "PUT",
      headers: Object.assign({}, getHeaders(), { "Content-Type": "application/json" }),
      body: JSON.stringify({ message: "update sites.yaml", content: content, sha: fileSha })
    });
    if (!res.ok) throw new Error("Save failed");
    var data = await res.json();
    fileSha = data.content.sha;
    toast("Saved to GitHub");
  } catch(e) {
    toast("Save failed: " + e.message, true);
  }
}

async function runScrape() {
  var btn = document.getElementById("btn-scrape");
  try {
    btn.disabled = true;
    btn.textContent = "Triggering…";
    var res = await fetch("https://api.github.com/repos/" + getUser() + "/" + REPO + "/actions/workflows/daily.yml/dispatches", {
      method: "POST",
      headers: Object.assign({}, getHeaders(), { "Content-Type": "application/json" }),
      body: JSON.stringify({ ref: "main" })
    });
    if (!res.ok) throw new Error("Trigger failed");
    setStatus("Scrape triggered — waiting for it to start…", "running");
    setTimeout(function() { pollStatus(); }, 5000);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = "Run Scrape Now";
    toast("Trigger failed: " + e.message, true);
  }
}

async function pollStatus() {
  try {
    var res = await fetch("https://api.github.com/repos/" + getUser() + "/" + REPO + "/actions/runs?per_page=1", { headers: getHeaders() });
    var data = await res.json();
    var run = data.workflow_runs[0];
    if (!run) return;
    if (run.status === "completed") {
      var btn = document.getElementById("btn-scrape");
      btn.disabled = false;
      btn.textContent = "Run Scrape Now";
      if (run.conclusion === "success") {
        var mins = Math.round((new Date(run.updated_at) - new Date(run.created_at)) / 60000);
        setStatus("Scrape completed successfully in ~" + mins + " min", "success");
        loadCaptures();
      } else {
        setStatus("Scrape finished with status: " + run.conclusion, "failed");
      }
      return;
    }
    var elapsed = Math.round((Date.now() - new Date(run.created_at)) / 60000);
    setStatus("Scraping in progress… (" + elapsed + " min elapsed)", "running");
    setTimeout(function() { pollStatus(); }, 10000);
  } catch(e) {
    setTimeout(function() { pollStatus(); }, 15000);
  }
}

// --- Captures management ---

async function loadCaptures() {
  var date = document.getElementById("capture-date").value;
  var list = document.getElementById("capture-list");
  var btnAll = document.getElementById("btn-delete-all");
  list.innerHTML = '<div class="empty-msg">Loading…</div>';
  btnAll.style.display = "none";
  captureFiles = [];

  try {
    // Get captures directory listing
    var res = await fetch("https://api.github.com/repos/" + getUser() + "/" + REPO + "/contents/captures", { headers: getHeaders() });
    if (!res.ok) { list.innerHTML = '<div class="empty-msg">No captures folder found</div>'; return; }
    var domains = await res.json();

    var found = [];
    for (var d = 0; d < domains.length; d++) {
      if (domains[d].type !== "dir") continue;
      var domain = domains[d].name;
      // Check if this domain has a folder for the selected date
      try {
        var dateRes = await fetch("https://api.github.com/repos/" + getUser() + "/" + REPO + "/contents/captures/" + domain + "/" + date, { headers: getHeaders() });
        if (!dateRes.ok) continue;
        var files = await dateRes.json();
        found.push({ domain: domain, files: files });
      } catch(e) { continue; }
    }

    if (found.length === 0) {
      list.innerHTML = '<div class="empty-msg">No captures for ' + date + '</div>';
      return;
    }

    captureFiles = found;
    list.innerHTML = found.map(function(item, i) {
      return '<div class="capture-row">' +
        '<span class="capture-domain">' + item.domain + ' <span style="color:#555;font-size:0.8rem">(' + item.files.length + ' files)</span></span>' +
        '<div class="capture-actions">' +
        '<button class="btn-delete" onclick="deleteCapture(' + i + ', this)">Delete</button>' +
        '</div></div>';
    }).join("");
    btnAll.style.display = "block";
  } catch(e) {
    list.innerHTML = '<div class="empty-msg">Error loading captures</div>';
  }
}

async function deleteFiles(files) {
  for (var f = 0; f < files.length; f++) {
    var file = files[f];
    // Fetch fresh SHA before each delete
    var freshRes = await fetch("https://api.github.com/repos/" + getUser() + "/" + REPO + "/contents/" + file.path, { headers: getHeaders() });
    if (!freshRes.ok) continue;
    var freshData = await freshRes.json();
    await fetch("https://api.github.com/repos/" + getUser() + "/" + REPO + "/contents/" + file.path, {
      method: "DELETE",
      headers: Object.assign({}, getHeaders(), { "Content-Type": "application/json" }),
      body: JSON.stringify({ message: "delete " + file.path, sha: freshData.sha })
    });
  }
}

async function deleteFiles(files) {
  for (var f = 0; f < files.length; f++) {
    var file = files[f];
    await fetch("https://api.github.com/repos/" + getUser() + "/" + REPO + "/contents/" + file.path, {
      method: "DELETE",
      headers: Object.assign({}, getHeaders(), { "Content-Type": "application/json" }),
      body: JSON.stringify({ message: "delete " + file.path, sha: file.sha })
    });
  }
}

async function deleteCapture(index, btn) {
  var item = captureFiles[index];
  if (!confirm("Delete all captures for " + item.domain + " on this date?")) return;
  btn.disabled = true;
  btn.textContent = "Deleting…";
  try {
    await deleteFiles(item.files);
    toast(item.domain + " captures deleted");
    loadCaptures();
  } catch(e) {
    toast("Delete failed: " + e.message, true);
    btn.disabled = false;
    btn.textContent = "Delete";
  }
}

async function deleteAllCaptures() {
  var date = document.getElementById("capture-date").value;
  if (!confirm("Delete ALL captures for " + date + "? This cannot be undone.")) return;
  var btn = document.getElementById("btn-delete-all");
  btn.disabled = true;
  btn.textContent = "Deleting all…";
  try {
    for (var i = 0; i < captureFiles.length; i++) {
      await deleteFiles(captureFiles[i].files);
    }
    toast("All captures for " + date + " deleted");
    loadCaptures();
  } catch(e) {
    toast("Delete failed: " + e.message, true);
  }
  btn.disabled = false;
  btn.textContent = "Delete all captures for this date";
}

// Auto-connect
if (localStorage.getItem("gh_token")) {
  document.getElementById("gh-user").value = localStorage.getItem("gh_user");
  document.getElementById("gh-token").value = localStorage.getItem("gh_token");
  loadSites();
}
</script>
</body>
</html>
